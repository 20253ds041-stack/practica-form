<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <div class="valores">
    <form action="Index.html" method="GET">
        <label for="usuario">Nombre de usuario (5 a 15 caracteres):</label>
        <input type="text" id="usuario" name="usuario" required minlength="5" maxlength="15" class="valores"> <br>
        <label for="edad">Edad (Rango permitido de 18 a 99 años):</label>
        <input type="number" id="edad" name="edad" required min="18" max="99" class="valores"><br>
        <label for="pais">País de residencia:</label>
        <select id="pais" name="pais" required class="valores">
            <option value="">Selecciona un país...</option>
            <option value="MX">México</option>
            <option value="CO">Colombia</option>
            <option value="AR">Argentina</option>
        </select><br>
        <input type="radio" id="cuenta-personal" name="tipo_cuenta" value="personal" required>
        <label for="cuenta-personal">Personal</label>

        <input type="radio" id="cuenta-empresa" name="tipo_cuenta" value="empresa">
        <label for="cuenta-empresa">Empresarial</label>

        <br><br>

        <input type="checkbox" id="terminos" name="terminos" value="aceptado" required class="valores">
        <label for="terminos">Acepto los términos y condiciones de la plataforma</label>
        <label for="comentarios">Comentarios o sugerencias (Máximo 200 caracteres):</label><br>
        <textarea id="comentarios" name="comentarios" maxlength="200"></textarea><br>
    </div>
        <button type="submit">Enviar formulario</button>

    </form>
</body>
</html>
